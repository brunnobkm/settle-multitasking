    <style>
      /* === SIMULAÇÃO: menu lateral esquerdo (52px fechado / 280px aberto) === */
      .menu-sidebar {
        position: relative;
        z-index: 30;
        flex: 0 0 52px;
        width: 52px;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        gap: 2px;
        padding: 12px 8px;
        background: #fff;
        border-right: 0.5px solid #d6d6d6;
        overflow: hidden;
        transition:
          flex-basis 220ms cubic-bezier(0.4, 0, 0.2, 1),
          width 220ms cubic-bezier(0.4, 0, 0.2, 1);
      }
      .menu-sidebar.is-open {
        flex-basis: 280px;
        width: 280px;
      }
      .menu-toggle {
        flex: 0 0 auto;
        width: 36px;
        height: 36px;
        display: grid;
        place-items: center;
        border: 0;
        border-radius: 8px;
        background: transparent;
        color: #1a1a1a;
        cursor: pointer;
        margin-bottom: 10px;
      }
      .menu-toggle:hover {
        background: #f1f1f1;
      }
      .menu-nav {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .menu-item {
        display: flex;
        align-items: center;
        gap: 12px;
        height: 40px;
        padding: 0 8px;
        border-radius: 8px;
        color: #525252;
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
        white-space: nowrap;
        cursor: pointer;
      }
      .menu-item:hover {
        background: #f1f1f1;
        color: #111;
      }
      .menu-item.is-active {
        background: #f1f1f1;
        color: #111;
      }
      .menu-ico {
        flex: 0 0 36px;
        display: grid;
        place-items: center;
      }
      .menu-ico svg {
        width: 20px;
        height: 20px;
        fill: none;
        stroke: currentColor;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .menu-toggle svg {
        width: 22px;
        height: 22px;
        fill: none;
        stroke: currentColor;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .menu-label {
        opacity: 0;
        transition: opacity 140ms ease;
      }
      .menu-sidebar.is-open .menu-label {
        opacity: 1;
      }
      /* SIMULAÇÃO: conteúdo principal mais perto da sidebar (16px) com padding menor */
      .page-content {
        padding: 16px;
        align-items: stretch;
        overflow: hidden;
      }
      /* SIMULAÇÃO: superfície de conteúdo que preenche a altura até o final */
      .sim-surface {
        display: flex;
        flex-direction: column;
        gap: 20px;
        height: 100%;
        min-height: 0;
        min-width: 0;
        background: #fff;
        border: 0.5px solid #d6d6d6;
        border-radius: 16px;
        padding: 24px;
      }
      /* cabeçalho do card também precisa poder encolher */
      .sim-head {
        min-width: 0;
      }
      .sim-head-text {
        min-width: 0;
      }
      .sim-head {
        flex: 0 0 auto;
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
      }
      .sim-head h2 {
        font-size: 24px;
        line-height: 1.2;
        letter-spacing: -0.01em;
        color: #111;
      }
      .sim-head p {
        margin-top: 6px;
        max-width: 520px;
        font-size: 14px;
        color: #666;
        line-height: 1.45;
      }
      .sim-list {
        flex: 1 1 auto;
        min-height: 0;
        overflow: auto;
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin: 0;
        padding: 0;
        list-style: none;
      }
      .sim-row {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 14px 16px;
        border: 0.5px solid #e2e2e2;
        border-radius: 12px;
      }
      .sim-row:hover {
        background: #fafafa;
      }
      .sim-row-main {
        flex: 1 1 auto;
        min-width: 0;
      }
      .sim-row-title {
        font-size: 14px;
        font-weight: 600;
        color: #111;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .sim-row-sub {
        margin-top: 2px;
        font-size: 12.5px;
        color: #777;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .sim-row-meta {
        flex: 0 0 auto;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 4px;
      }
      .sim-row-value {
        font-size: 14px;
        font-weight: 600;
        color: #111;
      }
      .sim-badge {
        font-size: 11px;
        font-weight: 600;
        padding: 2px 8px;
        border-radius: 999px;
        white-space: nowrap;
      }
      .sim-badge--analise {
        background: #fff4e5;
        color: #b25f00;
      }
      .sim-badge--novo {
        background: #e8f0fe;
        color: #1a56db;
      }
      .sim-badge--ok {
        background: #e7f5ec;
        color: #137a3e;
      }
      /* SIMULAÇÃO: skeleton (placeholder de conteúdo carregando) */
      @keyframes sim-pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.45;
        }
      }
      .sim-skel-list {
        flex: 1 1 auto;
        min-height: 0;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .sim-skel-row {
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 18px 16px;
        border: 0.5px solid #ececec;
        border-radius: 12px;
        min-width: 0;
        overflow: hidden;
      }
      .sim-skel-main {
        flex: 1 1 auto;
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 9px;
      }
      .sim-skel-meta {
        flex: 0 1 auto;
        min-width: 0;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 9px;
      }
      .sim-bar {
        height: 12px;
        border-radius: 6px;
        background: #e9e9e9;
      }
      /* larguras fluidas: % do espaço, com teto em px → encolhem sem quebrar */
      .sim-bar--title {
        width: 100%;
        max-width: 240px;
        height: 14px;
      }
      .sim-bar--sub {
        width: 100%;
        max-width: 360px;
      }
      .sim-bar--value {
        width: 100%;
        max-width: 110px;
        height: 14px;
      }
      .sim-bar--badge {
        width: 100%;
        max-width: 64px;
        height: 18px;
        border-radius: 999px;
      }
      .sim-skel-row:nth-child(odd) .sim-bar--sub {
        max-width: 300px;
      }
      .sim-skel-row:nth-child(3n) .sim-bar--sub {
        max-width: 410px;
      }
      .sim-skel-row:nth-child(3n) .sim-bar--title {
        max-width: 200px;
      }

      /* ============================================================= */
      /* SOLUÇÃO: workspace dimensionado pelo ESPAÇO ÚTIL = viewport − menu */
      /* (antes era % da viewport inteira, ignorando o menu)            */
      /* ============================================================= */
      .app-shell {
        --menu-width: 52px;
      }
      /* Largura controlada por JS (--ws-*-w), com fallback proporcional ao espaço útil.
         O JS aplica os mínimos e a reserva de conteúdo; a régua de 760px vira abas. */
      .app-shell.has-sidebar .workspace-sidebar {
        width: var(--ws-summary-w, calc((100vw - var(--menu-width)) * 0.39));
        flex-basis: var(--ws-summary-w, calc((100vw - var(--menu-width)) * 0.39));
      }
      .app-shell.has-sidebar.source-sidebar-open .workspace-sidebar {
        width: var(--ws-source-w, calc((100vw - var(--menu-width)) * 0.7));
        flex-basis: var(--ws-source-w, calc((100vw - var(--menu-width)) * 0.7));
      }
      /* deixa o handle de resize mais visível na simulação */
      .sidebar-resize-handle::before {
        background: #e2e2e2;
      }

      /* ===== Edital como largura PRÓPRIA: divisória arrastável Resumo|Edital ===== */
      .review-panel--sidebar.is-source-open:not(.is-compact-workspace) {
        grid-template-columns: minmax(320px, 1fr) minmax(320px, var(--edital-w, 1fr));
      }
      .source-view {
        position: relative;
      }
      .edital-divider {
        position: absolute;
        top: 0;
        left: -4px;
        width: 11px;
        height: 100%;
        margin: 0;
        padding: 0;
        border: 0;
        background: transparent;
        cursor: ew-resize;
        z-index: 25;
      }
      .edital-divider::before {
        content: "";
        position: absolute;
        left: 4px;
        top: 0;
        width: 2px;
        height: 100%;
        background: transparent;
        transition: background 0.15s ease;
      }
      .edital-divider:hover::before,
      .edital-divider:active::before {
        background: #3aa5a5;
      }
      /* em abas (compacto) não há lado-a-lado: some a divisória */
      .review-panel--sidebar.is-compact-workspace .edital-divider {
        display: none;
      }

      /* ===== indicador de resize do RESUMO igual ao da divisória do Edital ===== */
      .sidebar-resize-handle::before {
        width: 2px;
        background: transparent;
      }
      .sidebar-resize-handle:hover::before,
      .sidebar-resize-handle:active::before,
      .app-shell.is-resizing-sidebar .sidebar-resize-handle::before {
        background: #3aa5a5;
      }
      /* durante o arraste: sem transição → segue o cursor na hora (fluido, sem "travar") */
      .app-shell.ws-no-transition .workspace-sidebar,
      .app-shell.ws-no-transition .review-panel,
      .app-shell.ws-no-transition .source-view,
      .app-shell.ws-no-transition .page-content {
        transition: none !important;
      }

      /* ===== header do Resumo responsivo (não estoura nem joga o X pra fora) ===== */
      .review-header {
        min-width: 0;
        container-type: inline-size;
      }
      .review-title-row {
        min-width: 0;
        flex: 1 1 auto;
        overflow: hidden;
      }
      .review-title {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .review-actions {
        flex: 0 0 auto;
      }
      /* ===== kebab (⋮) do header: colapsa ações secundárias, mantém o fechar ===== */
      .review-actions {
        position: relative;
      }
      .header-kebab {
        display: none;
        width: 32px;
        height: 32px;
        align-items: center;
        justify-content: center;
        border: 0;
        border-radius: 8px;
        background: transparent;
        color: #1a1a1a;
        cursor: pointer;
      }
      .header-kebab:hover {
        background: #f1f1f1;
      }
      .header-kebab svg {
        width: 20px;
        height: 20px;
        fill: currentColor;
      }
      .header-kebab-menu {
        position: absolute;
        top: calc(100% + 6px);
        right: 0;
        min-width: 230px;
        display: flex;
        flex-direction: column;
        gap: 2px;
        background: #fff;
        border: 0.5px solid #d6d6d6;
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
        padding: 6px;
        z-index: 40;
      }
      .header-kebab-menu[hidden] {
        display: none;
      }
      .kebab-item {
        display: flex;
        align-items: center;
        gap: 10px;
        width: 100%;
        text-align: left;
        border: 0;
        border-radius: 8px;
        background: transparent;
        color: #1a1a1a;
        font: inherit;
        font-size: 13px;
        padding: 9px 10px;
        cursor: pointer;
      }
      .kebab-item:hover {
        background: #f1f1f1;
      }

      /* lado-a-lado: "Versão beta" some só quando o header fica bem estreito */
      @container (max-width: 380px) {
        .review-header .beta-badge {
          display: none;
        }
      }
      /* modo abas (compacto): as abas apertam o header → ações secundárias vão para o ⋮,
         mantendo título, badge e o fechar (X) */
      /* ações colapsam no ⋮ APENAS quando falta espaço (medido por JS → .actions-collapsed) */
      .review-header.actions-collapsed .review-actions .copy-btn,
      .review-header.actions-collapsed .review-actions .alert-btn {
        display: none;
      }
      .review-header.actions-collapsed .header-kebab {
        display: inline-flex;
      }

      /* ===== modo abas: título redundante some e as ações trocam por aba ===== */
      /* a aba já é o título → esconde o título e o separador */
      .review-panel--sidebar.is-compact-workspace .review-title-row,
      .review-panel--sidebar.is-source-open.is-compact-workspace .workspace-tabs-separator {
        display: none;
      }
      /* sem o título empurrando, as ações encostam à direita */
      .review-panel--sidebar.is-compact-workspace .review-actions {
        margin-left: auto;
      }
      /* na aba Edital (controles do edital no header) as ações do Resumo não aparecem */
      .review-header.has-edital-actions .copy-btn,
      .review-header.has-edital-actions .alert-btn,
      .review-header.has-edital-actions .header-kebab {
        display: none;
      }
      /* no modo abas as ações do edital SOBEM para o header (via JS) → some o toolbar antigo */
      .review-panel--sidebar.is-compact-workspace .source-header {
        display: none;
      }
      /* select de documento ocupando o meio do header (entre as abas e o download/X) */
      .review-header.has-edital-actions .source-select-wrap {
        flex: 1 1 auto;
        min-width: 0;
        height: 32px; /* mesma altura da pílula de abas */
        margin: 0;
      }
      .review-header.has-edital-actions .source-document-select {
        font-size: 14px;
        line-height: 32px;
      }
      /* texto do seletor de arquivo trunca com reticências quando ultrapassa a largura */
      .source-document-select {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
    </style>
  </head>

    <script src="./sheet.js?v=20260506-6"></script>
    <script>
      /* SIMULAÇÃO + SOLUÇÃO:
         - menu 52/280px informa --menu-width
         - workspace dimensionado pelo espaço útil (viewport − menu)
         - resize dinâmico do usuário, com mínimos e reserva de conteúdo
         - re-clamp quando o espaço muda → não quebra a responsividade */
      (function () {
        var appShell = document.querySelector("[data-app-shell]");
        var menu = document.querySelector("[data-menu-sidebar]");
        var toggle = document.querySelector("[data-menu-toggle]");
        var handle = document.querySelector("[data-sidebar-resize]");

        // regras de largura (px)
        var MIN_SOURCE = 480; // edital nunca menor que isso
        var MIN_SUMMARY = 320; // resumo nunca menor que isso
        var MIN_CONTENT = 640; // conteúdo sempre preserva pelo menos isso (confortável p/ tabela)
        var MAX_SUMMARY_FRAC = 0.45;

        // largura escolhida pelo usuário (px), lembrada por modo
        var userSourceW = null;
        var userSummaryW = null;

        function menuWidth() {
          return menu.classList.contains("is-open") ? 280 : 52;
        }
        function avail() {
          return window.innerWidth - menuWidth();
        }
        function clampSource(w) {
          var max = Math.max(MIN_SOURCE, avail() - MIN_CONTENT);
          return Math.round(Math.min(Math.max(w, MIN_SOURCE), max));
        }
        function clampSummary(w) {
          var max = Math.max(MIN_SUMMARY, Math.min(avail() * MAX_SUMMARY_FRAC, avail() - MIN_CONTENT));
          return Math.round(Math.min(Math.max(w, MIN_SUMMARY), max));
        }

        var MIN_RESUMO = 320; // resumo nunca menor que isso no lado-a-lado
        var MIN_EDITAL = 320; // edital nunca menor que isso
        var userEditalW = null; // largura própria do edital (px), escolhida pelo usuário

        function apply() {
          appShell.style.setProperty("--menu-width", menuWidth() + "px");
          if (!appShell.classList.contains("has-sidebar")) {
            // sidebar fechada: garante que o edital não vaze ao reabrir
            var p = document.querySelector(".review-panel--sidebar");
            if (p) {
              p.classList.remove("is-source-open");
              var sv = p.querySelector("[data-source-view]");
              if (sv) sv.hidden = true;
            }
            return;
          }
          if (appShell.classList.contains("source-sidebar-open")) {
            var w = clampSource(userSourceW != null ? userSourceW : avail() * 0.7);
            appShell.style.setProperty("--ws-source-w", w + "px");
            // largura própria do Edital dentro do workspace (re-clamp p/ não esmagar o Resumo)
            if (userEditalW != null) {
              var emax = Math.max(MIN_EDITAL, w - MIN_RESUMO);
              var ew = Math.round(Math.min(Math.max(userEditalW, MIN_EDITAL), emax));
              appShell.style.setProperty("--edital-w", ew + "px");
            } else {
              appShell.style.removeProperty("--edital-w");
            }
          } else {
            var s = clampSummary(userSummaryW != null ? userSummaryW : avail() * 0.39);
            appShell.style.setProperty("--ws-summary-w", s + "px");
          }
          if (typeof updateSidebarWorkspaceMode === "function") {
            updateSidebarWorkspaceMode();
          }
        }

        // menu abre/fecha
        if (menu && toggle) {
          toggle.addEventListener("click", function () {
            menu.classList.toggle("is-open");
            apply();
          });
        }

        // reage a abrir/fechar workspace e edital (classes do app-shell)
        new MutationObserver(apply).observe(appShell, {
          attributes: true,
          attributeFilter: ["class"],
        });

        // reage a redimensionar a janela (re-clamp)
        window.addEventListener("resize", apply);

        // === resize dinâmico pelo usuário ===
        var dragging = false;
        if (handle) {
          handle.addEventListener("pointerdown", function () {
            dragging = true;
            appShell.classList.add("ws-no-transition");
          });
        }
        document.addEventListener("pointermove", function (e) {
          if (!dragging) return;
          var desired = window.innerWidth - e.clientX; // sidebar ancorada à direita
          if (appShell.classList.contains("source-sidebar-open")) {
            userSourceW = clampSource(desired);
          } else {
            userSummaryW = clampSummary(desired);
          }
          apply();
        });
        document.addEventListener("pointerup", function () {
          if (dragging) {
            dragging = false;
            appShell.classList.remove("ws-no-transition");
          }
        });

        // === divisória Resumo|Edital: dá largura PRÓPRIA ao edital ===
        var sourceView = document.querySelector(".review-panel--sidebar [data-source-view]");
        var dividerDrag = false;
        if (sourceView && !sourceView.querySelector(".edital-divider")) {
          var divider = document.createElement("button");
          divider.type = "button";
          divider.className = "edital-divider";
          divider.setAttribute("aria-label", "Redimensionar largura dos Arquivos");
          sourceView.appendChild(divider);
          divider.addEventListener("pointerdown", function (e) {
            e.preventDefault();
            dividerDrag = true;
            appShell.classList.add("ws-no-transition");
            divider.setPointerCapture && divider.setPointerCapture(e.pointerId);
          });
        }
        document.addEventListener("pointermove", function (e) {
          if (!dividerDrag) return;
          // a borda direita do workspace coincide com a direita da viewport
          userEditalW = window.innerWidth - e.clientX;
          apply();
        });
        document.addEventListener("pointerup", function () {
          if (dividerDrag) {
            dividerDrag = false;
            appShell.classList.remove("ws-no-transition");
          }
        });

        // === kebab (⋮): colapsa Copiar + Histórico, mantém o fechar (X) ===
        var headerActions = document.querySelector(".review-panel--sidebar .review-actions");
        if (headerActions && !headerActions.querySelector(".header-kebab")) {
          var kebab = document.createElement("button");
          kebab.type = "button";
          kebab.className = "header-kebab";
          kebab.setAttribute("aria-label", "Mais ações");
          kebab.setAttribute("aria-haspopup", "true");
          kebab.innerHTML =
            '<svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/></svg>';

          var kebabMenu = document.createElement("div");
          kebabMenu.className = "header-kebab-menu";
          kebabMenu.hidden = true;
          kebabMenu.innerHTML =
            '<button type="button" class="kebab-item" data-copy-content>Copiar conteúdo</button>' +
            '<button type="button" class="kebab-item" data-history-toggle>Histórico de divergências</button>';

          var closeBtn = headerActions.querySelector(".close-btn");
          headerActions.insertBefore(kebab, closeBtn);
          headerActions.appendChild(kebabMenu);

          kebab.addEventListener("click", function (e) {
            e.stopPropagation();
            kebabMenu.hidden = !kebabMenu.hidden;
          });
          kebabMenu.addEventListener("click", function () {
            kebabMenu.hidden = true;
          });
          document.addEventListener("click", function (e) {
            if (!kebabMenu.hidden && !kebabMenu.contains(e.target) && !kebab.contains(e.target)) {
              kebabMenu.hidden = true;
            }
          });
        }

        // === aba Edital (compacto): sobe o select de documento + download para o header ===
        function syncEditalHeader() {
          var p = document.querySelector(".review-panel--sidebar");
          if (!p) return;
          var rHeader = p.querySelector(".review-header");
          var rActions = p.querySelector(".review-actions");
          var selectWrap = p.querySelector(".source-select-wrap");
          var downloadBtn = p.querySelector("[data-download-source]");
          var sHeader = p.querySelector(".source-header");
          var sActions = p.querySelector(".source-actions");
          if (!rHeader || !rActions || !selectWrap || !downloadBtn || !sHeader) return;
          var closeBtn = rActions.querySelector(".close-btn");
          var closeSrc = sActions && sActions.querySelector("[data-close-source]");
          var inHeader =
            p.classList.contains("is-compact-workspace") &&
            p.classList.contains("show-source-tab");
          if (inHeader) {
            var tabs = rHeader.querySelector(".workspace-tabs");
            if (tabs && selectWrap.parentElement !== rHeader) tabs.after(selectWrap);
            if (closeBtn && downloadBtn.parentElement !== rActions) {
              rActions.insertBefore(downloadBtn, closeBtn);
            }
            rHeader.classList.add("has-edital-actions");
          } else {
            if (selectWrap.parentElement !== sHeader) {
              sHeader.insertBefore(selectWrap, sHeader.firstChild);
            }
            if (sActions && closeSrc && downloadBtn.parentElement !== sActions) {
              sActions.insertBefore(downloadBtn, closeSrc);
            }
            rHeader.classList.remove("has-edital-actions");
          }
        }
        // === colapsa as ações do Resumo no ⋮ APENAS quando o header não comporta inline ===
        function syncHeaderOverflow() {
          var p = document.querySelector(".review-panel--sidebar");
          if (!p) return;
          var header = p.querySelector(".review-header");
          if (!header) return;
          // na aba Edital o header é do edital → não há o que colapsar aqui
          if (header.classList.contains("has-edital-actions")) {
            header.classList.remove("actions-collapsed");
            return;
          }
          // mede com as ações inline; se estourar, colapsa no ⋮
          header.classList.remove("actions-collapsed");
          void header.offsetWidth;
          if (header.scrollWidth > header.clientWidth + 1) {
            header.classList.add("actions-collapsed");
          }
        }
        function syncHeader() {
          syncEditalHeader();
          syncHeaderOverflow();
        }

        var sidebarPanelEl = document.querySelector(".review-panel--sidebar");
        if (sidebarPanelEl) {
          new MutationObserver(syncHeader).observe(sidebarPanelEl, {
            attributes: true,
            attributeFilter: ["class"],
          });
          var hdrEl = sidebarPanelEl.querySelector(".review-header");
          if (hdrEl) new ResizeObserver(syncHeaderOverflow).observe(hdrEl);
        }
        syncHeader();

        // === fechar (X) contextual no modo abas ===
        // aba Edital → fecha só o edital (volta ao Resumo); aba Resumo → fecha o workspace
        document.addEventListener(
          "click",
          function (e) {
            var closeBtn = e.target.closest && e.target.closest("[data-close-panel]");
            if (!closeBtn) return;
            var p = closeBtn.closest(".review-panel--sidebar");
            if (!p) return;
            if (
              p.classList.contains("is-compact-workspace") &&
              p.classList.contains("show-source-tab")
            ) {
              e.stopImmediatePropagation();
              e.preventDefault();
              if (typeof closeOpenSourceView === "function") closeOpenSourceView();
            }
          },
          true
        );

        apply();
      })();
    </script>
  </body>
</html>
